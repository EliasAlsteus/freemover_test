<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Freemover</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #2a2a2a;
    --bg-card: #333333;
    --bg-input: #3a3a3a;
    --border: rgba(255,255,255,0.1);
    --border-hover: rgba(255,255,255,0.25);
    --text: #f0ece4;
    --text-muted: rgba(240,236,228,0.45);
    --text-dim: rgba(240,236,228,0.25);
    --accent: #c8b89a;
    --accent-dim: rgba(200,184,154,0.15);
    --green: #8fb89a;
    --green-dim: rgba(143,184,154,0.15);
    --amber: #c8a86a;
    --amber-dim: rgba(200,168,106,0.15);
  }
  html { background: var(--bg); }
  body {
    font-family: 'EB Garamond', Georgia, serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 17px;
    line-height: 1.6;
  }
  /* NAV */
  nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 2rem 3rem;
    border-bottom: 0.5px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }
  .logo {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.12em;
    color: var(--accent);
    text-transform: uppercase;
  }
  .nav-tag {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.06em;
  }
  /* HERO */
  .hero {
    max-width: 820px;
    margin: 0 auto;
    padding: 5rem 2rem 4rem;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards;
  }
  .hero-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
  }
  h1 {
    font-size: clamp(2.4rem, 5vw, 3.8rem);
    font-weight: 400;
    line-height: 1.15;
    color: var(--text);
    margin-bottom: 1.25rem;
    letter-spacing: -0.01em;
  }
  h1 em {
    font-style: italic;
    color: var(--accent);
  }
  .hero-sub {
    font-size: 1.05rem;
    color: var(--text-muted);
    max-width: 480px;
    line-height: 1.7;
  }
  /* SEARCH */
  .search-section {
    max-width: 820px;
    margin: 0 auto;
    padding: 0 2rem 5rem;
    opacity: 0;
    animation: fadeUp 0.8s 0.15s ease forwards;
  }
  .search-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    border: 0.5px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 1px;
  }
  .search-grid-3 {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1px;
    border: 0.5px solid var(--border);
    border-top: none;
    border-radius: 0 0 4px 4px;
    overflow: hidden;
    margin-bottom: 1px;
  }
  .field {
    background: var(--bg-card);
    padding: 1rem 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
  }
  .field label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .field select {
    background: transparent;
    border: none;
    color: var(--text);
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 16px;
    outline: none;
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
  }
  .field select option { background: #333; color: var(--text); }
  .search-btn {
    width: 100%;
    background: var(--text);
    color: var(--bg);
    border: none;
    padding: 1rem 1.5rem;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 0 0 4px 4px;
    transition: background 0.2s, opacity 0.2s;
    margin-top: 1px;
  }
  .search-btn:hover { background: var(--accent); }
  /* DIVIDER */
  .divider {
    max-width: 820px;
    margin: 0 auto 3rem;
    padding: 0 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    opacity: 0;
    animation: fadeUp 0.8s 0.3s ease forwards;
  }
  .divider-line { flex: 1; height: 0.5px; background: var(--border); }
  .divider-text {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
  }
  /* RESULTS */
  .results {
    max-width: 820px;
    margin: 0 auto;
    padding: 0 2rem 6rem;
  }
  .results-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 2rem;
  }
  .results-header h2 {
    font-size: 1rem;
    font-weight: 400;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .results-header span {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
  }
  /* FILTERS */
  .filters {
    display: flex;
    gap: 8px;
    margin-bottom: 2rem;
    flex-wrap: wrap;
  }
  .filter-btn {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 6px 14px;
    border: 0.5px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--border-hover); color: var(--text); }
  .filter-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
  /* UNI CARDS */
  .uni-card {
    border: 0.5px solid var(--border);
    border-radius: 4px;
    padding: 1.75rem 2rem;
    margin-bottom: 1px;
    background: var(--bg-card);
    transition: border-color 0.2s;
    opacity: 0;
    animation: fadeUp 0.5s ease forwards;
  }
  .uni-card:hover { border-color: var(--border-hover); }
  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 1.25rem;
    gap: 1rem;
  }
  .uni-name {
    font-size: 1.25rem;
    font-weight: 500;
    color: var(--text);
    line-height: 1.3;
  }
  .uni-city {
    font-size: 0.9rem;
    color: var(--text-muted);
    margin-top: 2px;
    font-style: italic;
  }
  .match-badge {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 2px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .badge-high { background: var(--green-dim); color: var(--green); border: 0.5px solid rgba(143,184,154,0.3); }
  .badge-mid { background: var(--amber-dim); color: var(--amber); border: 0.5px solid rgba(200,168,106,0.3); }
  .badge-low { background: rgba(255,255,255,0.05); color: var(--text-muted); border: 0.5px solid var(--border); }
  /* MATCH BAR */
  .match-row {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.25rem;
  }
  .match-bar {
    flex: 1;
    height: 1px;
    background: var(--border);
    border-radius: 1px;
    overflow: hidden;
  }
  .match-fill {
    height: 100%;
    border-radius: 1px;
    transition: width 0.8s ease;
  }
  .fill-high { background: var(--green); }
  .fill-mid { background: var(--amber); }
  .fill-low { background: var(--text-dim); }
  .match-pct {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    min-width: 32px;
    text-align: right;
  }
  /* META */
  .card-meta {
    display: flex;
    gap: 2rem;
    flex-wrap: wrap;
    margin-bottom: 1.25rem;
    padding-top: 1.25rem;
    border-top: 0.5px solid var(--border);
  }
  .meta-item {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .meta-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .meta-val {
    font-size: 0.95rem;
    color: var(--text);
  }
  /* COURSE TAGS */
  .course-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .course-tag {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.04em;
    color: var(--text-muted);
    padding: 3px 10px;
    border: 0.5px solid var(--border);
    border-radius: 2px;
  }
  /* UNI LINK */
  .card-link {
    display: inline-block;
    margin-top: 1.25rem;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
    text-decoration: none;
    border-bottom: 0.5px solid rgba(200,184,154,0.3);
    padding-bottom: 1px;
    transition: border-color 0.15s;
  }
  .card-link:hover { border-color: var(--accent); }
  /* EMPTY */
  .empty {
    text-align: center;
    padding: 4rem 1rem;
    color: var(--text-muted);
    font-style: italic;
  }
  /* FOOTER */
  footer {
    border-top: 0.5px solid var(--border);
    padding: 2rem 3rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  footer span {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @media (max-width: 600px) {
    nav { padding: 1.5rem; }
    .hero, .search-section, .results { padding-left: 1.25rem; padding-right: 1.25rem; }
    .search-grid, .search-grid-3 { grid-template-columns: 1fr; }
    .card-top { flex-direction: column; }
    .card-meta { gap: 1.25rem; }
    footer { flex-direction: column; gap: 0.5rem; text-align: center; }
  }
</style>
</head>
<body>

<nav>
  <div class="logo">Freemover</div>
  <div class="nav-tag">Beta — Nederländerna & Finland</div>
</nav>

<section class="hero">
  <p class="hero-label">Utbytesstudier, förenklat</p>
  <h1>Hitta ditt <em>rätta</em><br>utbytesuniversitet</h1>
  <p class="hero-sub">Se vilka utländska lärosäten som matchar just din utbildning — utan att leta igenom hundratals hemsidor.</p>
</section>

<section class="search-section">
  <div class="search-grid">
    <div class="field">
      <label>Ditt lärosäte</label>
      <select id="sel-home">
        <option>Linköpings universitet</option>
        <option>KTH</option>
        <option>Chalmers</option>
        <option>Lunds universitet</option>
      </select>
    </div>
    <div class="field">
      <label>Din utbildning</label>
      <select id="sel-prog">
        <option>Civilingenjör Datateknik</option>
        <option>Civilingenjör Maskinteknik</option>
        <option>Ekonomi</option>
      </select>
    </div>
  </div>
  <div class="search-grid-3">
    <div class="field">
      <label>Land</label>
      <select id="sel-country">
        <option value="all">Alla länder</option>
        <option value="Nederländerna">Nederländerna</option>
        <option value="Finland">Finland</option>
      </select>
    </div>
    <div class="field">
      <label>Termin</label>
      <select id="sel-term">
        <option>Höst 2025</option>
        <option>Vår 2026</option>
      </select>
    </div>
    <div class="field">
      <label>Språk</label>
      <select id="sel-lang">
        <option value="all">Alla</option>
        <option value="Engelska">Engelska</option>
      </select>
    </div>
  </div>
  <button class="search-btn" onclick="runSearch()">Sök kompatibla universitet →</button>
</section>

<div class="divider">
  <div class="divider-line"></div>
  <div class="divider-text" id="divider-label">Laddar lärosäten...</div>
  <div class="divider-line"></div>
</div>

<section class="results">
  <div id="results-header" class="results-header" style="display:none">
    <h2 id="results-title">Resultat</h2>
    <span id="results-count"></span>
  </div>
  <div class="filters" id="filters" style="display:none">
    <button class="filter-btn active" onclick="setFilter(this,'all')">Alla</button>
    <button class="filter-btn" onclick="setFilter(this,'high')">Hög matchning</button>
    <button class="filter-btn" onclick="setFilter(this,'nl')">Nederländerna</button>
    <button class="filter-btn" onclick="setFilter(this,'fi')">Finland</button>
    <button class="filter-btn" onclick="setFilter(this,'free')">Utan avgift</button>
  </div>
  <div id="uni-list"></div>
</section>

<footer>
  <span>Freemover © 2025</span>
  <span>Data uppdaterad manuellt — bidra gärna</span>
</footer>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTAa9qeWsvV_sYuZ5m8-2t-3N08Y2sN1_au0tEZqBYWzFRJP9NGLTxZKSN40y-Sq6HoDbWH-iO80bPT/pub?output=csv";

let universities = [];
let currentFilter = 'all';
let searched = false;

// === NYTT: Ladda data från Google Sheets ===
async function loadData() {
  try {
    const response = await fetch(CSV_URL);
    const csvText = await response.text();
    universities = parseCSV(csvText);
    document.getElementById('divider-label').textContent = universities.length + ' lärosäten i databasen';
    runSearch(); // visa resultat direkt
  } catch (e) {
    console.error(e);
    document.getElementById('divider-label').textContent = 'Kunde inte ladda data från Google Sheets';
  }
}

function parseCSV(csv) {
  const rows = csv.trim().split('\n');
  const data = [];
  for (let i = 1; i < rows.length; i++) {
    const cols = rows[i].split(',').map(c => c.replace(/"/g, '').trim());
    if (cols.length < 6) continue;
    if (cols[5] && cols[5].toLowerCase() === 'ja') {
      data.push({
        id: cols[0],
        name: cols[1],
        city: cols[3],
        country: cols[2],
        url: cols[4],
        lang: cols[5],
        deadline_ht: cols[6] || "Okänd",
        cost: cols[8] ? parseInt(cols[8]) : null,
        reg: cols[9] ? parseInt(cols[9]) : null,
        spraakkrav: cols[11] || "",
        match: 75,
        comment: cols[14] || "",
        courses: []
      });
    }
  }
  return data;
}

// === Dina exakta originalfunktioner (oförändrade) ===
function badgeClass(m) {
  if (m === null) return 'badge-low';
  if (m >= 80) return 'badge-high';
  if (m >= 65) return 'badge-mid';
  return 'badge-low';
}
function fillClass(m) {
  if (m === null) return 'fill-low';
  if (m >= 80) return 'fill-high';
  if (m >= 65) return 'fill-mid';
  return 'fill-low';
}
function fmtCost(c) {
  if (c === null || c === undefined) return 'Okänt';
  if (c === 0) return 'Gratis';
  return '€' + c.toLocaleString('sv-SE') + ' / år';
}
function renderCard(u, delay) {
  const matchLabel = u.match !== null ? u.match + '% matchning' : 'Ej beräknad';
  const matchWidth = u.match !== null ? u.match : 20;
  const tags = u.courses.length ? u.courses.map(t => `<span class="course-tag">${t}</span>`).join('') : '';
  return `
    <div class="uni-card" style="animation-delay:${delay}s">
      <div class="card-top">
        <div>
          <div class="uni-name">${u.name}</div>
          <div class="uni-city">${u.city}, ${u.country}</div>
        </div>
        <span class="match-badge ${badgeClass(u.match)}">${matchLabel}</span>
      </div>
      <div class="match-row">
        <div class="match-bar"><div class="match-fill ${fillClass(u.match)}" style="width:${matchWidth}%"></div></div>
        <span class="match-pct">${u.match !== null ? u.match + '%' : '—'}</span>
      </div>
      <div class="card-meta">
        <div class="meta-item">
          <span class="meta-label">Avgift</span>
          <span class="meta-val">${fmtCost(u.cost)}</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">Språk</span>
          <span class="meta-val">${u.lang}</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">Deadline HT</span>
          <span class="meta-val">${u.deadline_ht}</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">Språkkrav</span>
          <span class="meta-val">${u.spraakkrav}</span>
        </div>
      </div>
      ${tags ? `<div class="course-tags">${tags}</div>` : ''}
      ${u.comment ? `<p style="margin-top:1rem;font-size:0.9rem;color:var(--text-muted);font-style:italic;">${u.comment}</p>` : ''}
      <a class="card-link" href="${u.url}" target="_blank">Besök universitetet →</a>
    </div>`;
}
function applyFilter(list) {
  const country = document.getElementById('sel-country').value;
  if (currentFilter === 'high') return list.filter(u => u.match >= 80);
  if (currentFilter === 'nl') return list.filter(u => u.country === 'Nederländerna');
  if (currentFilter === 'fi') return list.filter(u => u.country === 'Finland');
  if (currentFilter === 'free') return list.filter(u => u.cost === 0);
  return list;
}
function runSearch() {
  searched = true;
  const country = document.getElementById('sel-country').value;
  const lang = document.getElementById('sel-lang').value;
  let list = [...universities];
  if (country !== 'all') list = list.filter(u => u.country === country);
  if (lang !== 'all') list = list.filter(u => u.lang.includes(lang));
  list.sort((a, b) => (b.match ?? -1) - (a.match ?? -1));
  document.getElementById('results-header').style.display = 'flex';
  document.getElementById('filters').style.display = 'flex';
  document.getElementById('divider-label').textContent = list.length + ' resultat hittade';
  document.getElementById('results-title').textContent = 'Kompatibla universitet';
  window._searchResult = list;
  renderList(list);
}
function renderList(list) {
  const filtered = applyFilter(list);
  document.getElementById('results-count').textContent = filtered.length + ' lärosäten';
  const el = document.getElementById('uni-list');
  if (!filtered.length) {
    el.innerHTML = '<div class="empty">Inga resultat – prova andra filter.</div>';
    return;
  }
  el.innerHTML = filtered.map((u, i) => renderCard(u, i * 0.07)).join('');
}
function setFilter(btn, type) {
  currentFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (window._searchResult) renderList(window._searchResult);
}

// Starta
loadData();
</script>
</body>
</html>
