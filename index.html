<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UniMatchr</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #2a2a2a;
    --bg-card: #333333;
    --bg-input: #3a3a3a;
    --border: rgba(255,255,255,0.1);
    --border-hover: rgba(255,255,255,0.25);
    --text: #f0ece4;
    --text-muted: rgba(240,236,228,0.45);
    --text-dim: rgba(240,236,228,0.25);
    --accent: #c8b89a;
    --accent-dim: rgba(200,184,154,0.15);
    --green: #8fb89a;
    --green-dim: rgba(143,184,154,0.15);
    --amber: #c8a86a;
    --amber-dim: rgba(200,168,106,0.15);
  }

  html { background: var(--bg); }

  body {
    font-family: 'EB Garamond', Georgia, serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 17px;
    line-height: 1.6;
  }

  nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 2rem 3rem;
    border-bottom: 0.5px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }
  .logo {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.12em;
    color: var(--accent);
    text-transform: uppercase;
  }
  .nav-tag {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.06em;
  }

  .hero {
    max-width: 820px;
    margin: 0 auto;
    padding: 5rem 2rem 4rem;
  }
  .hero-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
    opacity: 0;
  }
  h1 {
    font-size: clamp(2.4rem, 5vw, 3.8rem);
    font-weight: 400;
    line-height: 1.15;
    color: var(--text);
    margin-bottom: 1.25rem;
    letter-spacing: -0.01em;
    opacity: 0;
  }
  h1 em { font-style: italic; color: var(--accent); }
 .char {
  display: inline-block;
}
  .hero-sub {
    font-size: 1.05rem;
    color: var(--text-muted);
    max-width: 480px;
    line-height: 1.7;
    opacity: 0;
  }

  .search-section {
    max-width: 820px;
    margin: 0 auto;
    padding: 0 2rem 5rem;
    opacity: 0;
    animation: fadeUp 0.8s 0.4s ease forwards;
  }
  .search-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    border: 0.5px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 1px;
  }
  .search-grid-3 {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1px;
    border: 0.5px solid var(--border);
    border-top: none;
    border-radius: 0 0 4px 4px;
    overflow: hidden;
    margin-bottom: 1px;
  }
  .field {
    background: var(--bg-card);
    padding: 1rem 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
  }
  .field label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .field select {
    background: transparent;
    border: none;
    color: var(--text);
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 16px;
    outline: none;
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
  }
  .field select option { background: #333; color: var(--text); }

  .search-btn {
    width: 100%;
    background: var(--text);
    color: var(--bg);
    border: none;
    padding: 1rem 1.5rem;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 0 0 4px 4px;
    transition: background 0.2s;
    margin-top: 1px;
  }
  .search-btn:hover { background: var(--accent); }

  .divider {
    max-width: 820px;
    margin: 0 auto 3rem;
    padding: 0 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    opacity: 0;
    animation: fadeUp 0.8s 0.55s ease forwards;
  }
  .divider-line { flex: 1; height: 0.5px; background: var(--border); }
  .divider-text {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
  }

  .results { max-width: 820px; margin: 0 auto; padding: 0 2rem 6rem; }
  .results-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 2rem;
  }
  .results-header h2 {
    font-weight: 400;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .results-header span { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-dim); }

  .filters { display: flex; gap: 8px; margin-bottom: 2rem; flex-wrap: wrap; }
  .filter-btn {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 6px 14px;
    border: 0.5px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--border-hover); color: var(--text); }
  .filter-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

  .uni-card {
    border: 0.5px solid var(--border);
    border-radius: 4px;
    padding: 1.75rem 2rem;
    margin-bottom: 1px;
    background: var(--bg-card);
    transition: border-color 0.2s;
    opacity: 0;
  }
  .uni-card:hover { border-color: var(--border-hover); }

  .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.25rem; gap: 1rem; }
  .uni-name { font-size: 1.25rem; font-weight: 500; color: var(--text); line-height: 1.3; }
  .uni-city { font-size: 0.9rem; color: var(--text-muted); margin-top: 2px; font-style: italic; }
  .match-badge {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 2px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .badge-high { background: var(--green-dim); color: var(--green); border: 0.5px solid rgba(143,184,154,0.3); }
  .badge-mid  { background: var(--amber-dim); color: var(--amber); border: 0.5px solid rgba(200,168,106,0.3); }
  .badge-low  { background: rgba(255,255,255,0.05); color: var(--text-muted); border: 0.5px solid var(--border); }

  .match-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.25rem; }
  .match-bar { flex: 1; height: 1px; background: var(--border); border-radius: 1px; overflow: hidden; }
  .match-fill { height: 100%; border-radius: 1px; }
  .fill-high { background: var(--green); }
  .fill-mid  { background: var(--amber); }
  .fill-low  { background: var(--text-dim); }
  .match-pct { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-muted); min-width: 32px; text-align: right; }

  .card-meta { display: flex; gap: 2rem; flex-wrap: wrap; margin-bottom: 1.25rem; padding-top: 1.25rem; border-top: 0.5px solid var(--border); }
  .meta-item { display: flex; flex-direction: column; gap: 3px; }
  .meta-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-dim); }
  .meta-val { font-size: 0.95rem; color: var(--text); }

  .card-link {
    display: inline-block;
    margin-top: 1.25rem;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
    text-decoration: none;
    border-bottom: 0.5px solid rgba(200,184,154,0.3);
    padding-bottom: 1px;
    transition: border-color 0.15s;
  }
  .card-link:hover { border-color: var(--accent); }

  .empty { text-align: center; padding: 4rem 1rem; color: var(--text-muted); font-style: italic; }

  footer {
    border-top: 0.5px solid var(--border);
    padding: 2rem 3rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  footer span { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-dim); letter-spacing: 0.06em; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 600px) {
    nav { padding: 1.5rem; }
    .hero, .search-section, .results { padding-left: 1.25rem; padding-right: 1.25rem; }
    .search-grid, .search-grid-3 { grid-template-columns: 1fr; }
    .card-top { flex-direction: column; }
    .card-meta { gap: 1.25rem; }
    footer { flex-direction: column; gap: 0.5rem; text-align: center; }
  }
</style>
</head>
<body>

<nav>
  <div class="logo">UniMatchr</div>
  <div class="nav-tag">Version Beta</div>
</nav>

<section class="hero">
  <p class="hero-label">Exchange studies, simplified</p>
  <h1 class="hero-title">
  Find your <em>perfect</em><br>
  <span class="animated-text">exchange university</span>
</h1>
  <p class="hero-sub">See which universities match your degree — without browsing hundreds of websites.</p>
</section>

<section class="search-section">
  <div class="search-grid">
    <div class="field">
      <label>Your University</label>
      <select id="sel-home">
        <option>Linköping University</option>
        <option>KTH</option>
        <option>Chalmers</option>
        <option>Lund University</option>
      </select>
    </div>
    <div class="field">
      <label>Your Program</label>
      <select id="sel-prog">
        <option>Computer Science & Engineering</option>
        <option>Mechanical Engineering</option>
        <option>Economics</option>
      </select>
    </div>
  </div>
  <div class="search-grid-3">
    <div class="field">
      <label>Country</label>
      <select id="sel-country">
        <option value="all">All Countries</option>
      </select>
    </div>
    <div class="field">
      <label>Semester</label>
      <select id="sel-term">
        <option>Fall</option>
        <option>Spring</option>
      </select>
    </div>
    <div class="field">
      <label>Language</label>
      <select id="sel-lang">
        <option value="all">All</option>
        <option value="English">English</option>
      </select>
    </div>
  </div>
  <button class="search-btn" onclick="runSearch()">Search Compatible Universities →</button>
</section>

<div class="divider">
  <div class="divider-line"></div>
  <div class="divider-text" id="divider-label">Loading data...</div>
  <div class="divider-line"></div>
</div>

<section class="results">
  <div id="results-header" class="results-header" style="display:none">
    <h2 id="results-title">Results</h2>
    <span id="results-count"></span>
  </div>
  <div class="filters" id="filters" style="display:none">
    <button class="filter-btn active" onclick="setFilter(this,'all')">All</button>
    <button class="filter-btn" onclick="setFilter(this,'cheapest')">Cheapest</button>
    <button class="filter-btn" onclick="setFilter(this,'gpa')">GPA Requirement</button>
  </div>
  <div id="uni-list"></div>
</section>

<footer>
  <span>UniMatchr © 2025</span>
  <span>Data updated from Google Sheets — <span id="last-sync">loading...</span></span>
</footer>

<script src="https://cdn.jsdelivr.net/npm/animejs/dist/bundles/anime.umd.min.js"></script>
<script>
const { animate, spring } = anime;

// Spring-animera hero när sidan laddas
window.addEventListener('load', () => {
  ['.hero-label', 'h1', '.hero-sub'].forEach((sel, i) => {
    animate(sel, {
      opacity: [0, 1],
      translateY: [36, 0],
      delay: i * 130,
      ease: spring({ bounce: 0.5, duration: 628 })
    });
  });
});

// Spring-animera kort när de renderas
function animateCards() {
  document.querySelectorAll('.uni-card').forEach((card, i) => {
    animate(card, {
      opacity: [0, 1],
      translateY: [28, 0],
      delay: i * 75,
      ease: spring({ bounce: 0.4, duration: 628 })
    });
  });
}

let universities = [];
let currentFilter = 'all';
let searched = false;
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTAa9qeWsvV_sYuZ5m8-2t-3N08Y2sN1_au0tEZqBYWzFRJP9NGLTxZKSN40y-Sq6HoDbWH-iO80bPT/pub?output=csv';
const REFRESH_INTERVAL = 5 * 60 * 1000;

function parseCSV(csvText) {
  const rows = [];
  let currentRow = [], currentField = '', insideQuotes = false;
  for (let i = 0; i < csvText.length; i++) {
    const char = csvText[i], nextChar = csvText[i + 1];
    if (char === '"') {
      if (insideQuotes && nextChar === '"') { currentField += '"'; i++; }
      else insideQuotes = !insideQuotes;
    } else if (char === ',' && !insideQuotes) {
      currentRow.push(currentField.trim()); currentField = '';
    } else if ((char === '\n' || char === '\r') && !insideQuotes) {
      if (currentField || currentRow.length > 0) {
        currentRow.push(currentField.trim());
        if (currentRow.some(f => f)) rows.push(currentRow);
        currentRow = []; currentField = '';
      }
      if (char === '\r' && nextChar === '\n') i++;
    } else { currentField += char; }
  }
  if (currentField || currentRow.length > 0) {
    currentRow.push(currentField.trim());
    if (currentRow.some(f => f)) rows.push(currentRow);
  }
  return rows;
}

function parseCSVToUniversities(csvText) {
  const rows = parseCSV(csvText);
  if (rows.length < 2) return [];
  return rows.slice(1).filter(v => v.length >= 3 && v[0]).map(values => ({
    id: values[0], name: values[1] || 'Unknown University',
    country: values[2] || 'Unknown Country', city: values[3] || 'Unknown City',
    url: values[4] || '#', lang: values[5] || 'English',
    freemover: values[6] || 'Unknown', deadline_ht: values[7] || '—',
    deadline_vt: values[8] || '—',
    cost: values[9] ? parseInt(values[9]) : null,
    reg: values[10] ? parseInt(values[10]) : null,
    gpa_krav: values[11] || '—', spraakkrav: values[12] || '—',
    max_terminer: values[13] || '—', kontakt: values[14] || '',
    anteckningar: values[15] || '', match: null
  }));
}

function updateCountryDropdown() {
  const countries = [...new Set(universities.map(u => u.country))].sort();
  const select = document.getElementById('sel-country');
  const currentValue = select.value;
  select.innerHTML = '<option value="all">All Countries</option>';
  countries.forEach(country => {
    if (country) {
      const opt = document.createElement('option');
      opt.value = country; opt.textContent = country;
      select.appendChild(opt);
    }
  });
  if (currentValue !== 'all' && countries.includes(currentValue)) select.value = currentValue;
}

async function fetchAndUpdateData() {
  try {
    const response = await fetch(CSV_URL);
    if (!response.ok) throw new Error('Could not fetch data');
    const csvText = await response.text();
    universities = parseCSVToUniversities(csvText);
    updateCountryDropdown();
    document.getElementById('divider-label').textContent = universities.length + ' universities in database';
    const now = new Date();
    document.getElementById('last-sync').textContent = 'updated ' + now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
    if (searched) runSearch();
  } catch (error) {
    console.error('Error fetching data:', error);
    document.getElementById('divider-label').textContent = 'Error fetching data';
  }
}

function badgeClass(m) { return m === null ? 'badge-low' : m >= 80 ? 'badge-high' : m >= 65 ? 'badge-mid' : 'badge-low'; }
function fillClass(m)  { return m === null ? 'fill-low'  : m >= 80 ? 'fill-high'  : m >= 65 ? 'fill-mid'  : 'fill-low'; }
function fmtCost(c) {
  if (c === null || c === undefined) return 'Unknown';
  if (c === 0) return 'Free';
  return '€' + c.toLocaleString('en-US') + ' / term';
}

function renderCard(u) {
  const matchLabel = u.match !== null ? u.match + '% match' : 'Not calculated';
  const matchWidth = u.match !== null ? u.match : 20;
  return `
    <div class="uni-card">
      <div class="card-top">
        <div>
          <div class="uni-name">${u.name}</div>
          <div class="uni-city">${u.city}, ${u.country}</div>
        </div>
        <span class="match-badge ${badgeClass(u.match)}">${matchLabel}</span>
      </div>
      <div class="match-row">
        <div class="match-bar"><div class="match-fill ${fillClass(u.match)}" style="width:${matchWidth}%"></div></div>
        <span class="match-pct">${u.match !== null ? u.match + '%' : '—'}</span>
      </div>
      <div class="card-meta">
        <div class="meta-item"><span class="meta-label">Tuition</span><span class="meta-val">${fmtCost(u.cost)}</span></div>
        <div class="meta-item"><span class="meta-label">Language</span><span class="meta-val">${u.lang}</span></div>
        <div class="meta-item"><span class="meta-label">Deadline Fall</span><span class="meta-val">${u.deadline_ht}</span></div>
        <div class="meta-item"><span class="meta-label">GPA Requirement</span><span class="meta-val">${u.gpa_krav}</span></div>
      </div>
      ${u.anteckningar ? `<p style="margin-top:1rem;font-size:0.9rem;color:var(--text-muted);font-style:italic;">${u.anteckningar}</p>` : ''}
      <a class="card-link" href="${u.url}" target="_blank">Visit University →</a>
    </div>`;
}

function applyFilter(list) {
  if (currentFilter === 'cheapest') return [...list].sort((a, b) => (a.cost ?? Infinity) - (b.cost ?? Infinity));
  if (currentFilter === 'gpa') return list.filter(u => u.gpa_krav && u.gpa_krav !== '—');
  return list;
}

function runSearch() {
  searched = true;
  const country = document.getElementById('sel-country').value;
  const lang    = document.getElementById('sel-lang').value;
  let list = [...universities];
  if (country !== 'all') list = list.filter(u => u.country === country);
  if (lang !== 'all')    list = list.filter(u => u.lang.includes(lang));
  list.sort((a, b) => (b.match ?? -1) - (a.match ?? -1));
  document.getElementById('results-header').style.display = 'flex';
  document.getElementById('filters').style.display = 'flex';
  document.getElementById('results-title').textContent = 'Compatible Universities';
  window._searchResult = list;
  renderList(list);
}

function renderList(list) {
  const filtered = applyFilter(list);
  document.getElementById('results-count').textContent = filtered.length + ' universities';
  const el = document.getElementById('uni-list');
  if (!filtered.length) { el.innerHTML = '<div class="empty">No results — try different filters.</div>'; return; }
  el.innerHTML = filtered.map(u => renderCard(u)).join('');
  animateCards();
}

function setFilter(btn, type) {
  currentFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (window._searchResult) renderList(window._searchResult);
}

fetchAndUpdateData();
setInterval(fetchAndUpdateData, REFRESH_INTERVAL);
// TEXT ANIMATION (SAFE VERSION)
window.addEventListener('load', () => {
  const el = document.querySelector('.animated-text');
  if (!el) return;

  const text = el.textContent;
  el.innerHTML = text
    .split('')
    .map(c => `<span class="char">${c}</span>`)
    .join('');

  anime({
    targets: '.char',
    translateY: [
      { value: '-2.75rem', duration: 600, easing: 'easeOutExpo' },
      { value: 0, duration: 800, delay: 100, easing: 'easeOutBounce' }
    ],
    rotate: {
      value: '1turn',
      delay: 0
    },
    delay: anime.stagger(50),
    easing: 'easeInOutCirc',
    loop: true,
    loopDelay: 1000
  });
});
</script>
</body>
</html>
