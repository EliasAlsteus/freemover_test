<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Freemover</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #2a2a2a;
    --bg-card: #333333;
    --bg-input: #3a3a3a;
    --border: rgba(255,255,255,0.1);
    --border-hover: rgba(255,255,255,0.25);
    --text: #f0ece4;
    --text-muted: rgba(240,236,228,0.45);
    --text-dim: rgba(240,236,228,0.25);
    --accent: #c8b89a;
    --green: #8fb89a;
    --amber: #c8a86a;
  }

  html { background: var(--bg); }

  body {
    font-family: 'EB Garamond', Georgia, serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 17px;
    line-height: 1.6;
  }

  nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 2rem 3rem;
    border-bottom: 0.5px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }
  .logo {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.12em;
    color: var(--accent);
    text-transform: uppercase;
  }
  .nav-tag {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.06em;
  }

  .hero {
    max-width: 820px;
    margin: 0 auto;
    padding: 5rem 2rem 4rem;
  }
  .hero-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
  }
  h1 {
    font-size: clamp(2.4rem, 5vw, 3.8rem);
    font-weight: 400;
    line-height: 1.15;
    color: var(--text);
    margin-bottom: 1.25rem;
    letter-spacing: -0.01em;
  }
  h1 em { font-style: italic; color: var(--accent); }
  .hero-sub {
    font-size: 1.05rem;
    color: var(--text-muted);
    max-width: 480px;
    line-height: 1.7;
  }

  .search-section {
    max-width: 820px;
    margin: 0 auto;
    padding: 0 2rem 5rem;
  }
  .search-grid, .search-grid-3 {
    display: grid;
    gap: 1px;
    border: 0.5px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }
  .search-grid { grid-template-columns: 1fr 1fr; }
  .search-grid-3 { grid-template-columns: 1fr 1fr 1fr; margin-top: 1px; }
  .field {
    background: var(--bg-card);
    padding: 1rem 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
  }
  .field label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .field select {
    background: transparent;
    border: none;
    color: var(--text);
    font-size: 16px;
    outline: none;
    cursor: pointer;
  }

  .search-btn {
    width: 100%;
    background: var(--text);
    color: var(--bg);
    border: none;
    padding: 1rem 1.5rem;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 1px;
  }
  .search-btn:hover { background: var(--accent); }

  .divider {
    max-width: 820px;
    margin: 0 auto 3rem;
    padding: 0 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .divider-line { flex: 1; height: 0.5px; background: var(--border); }
  .divider-text {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
  }

  .results {
    max-width: 820px;
    margin: 0 auto;
    padding: 0 2rem 6rem;
  }
  .uni-card {
    border: 0.5px solid var(--border);
    border-radius: 4px;
    padding: 1.75rem 2rem;
    margin-bottom: 1px;
    background: var(--bg-card);
    transition: border-color 0.2s;
  }
  .uni-card:hover { border-color: var(--border-hover); }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 1.25rem;
    gap: 1rem;
  }
  .uni-name {
    font-size: 1.25rem;
    font-weight: 500;
    line-height: 1.3;
  }
  .uni-city {
    font-size: 0.9rem;
    color: var(--text-muted);
    margin-top: 2px;
    font-style: italic;
  }
  .match-badge {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 2px;
    white-space: nowrap;
  }
  .badge-high { background: rgba(143,184,154,0.15); color: var(--green); border: 0.5px solid rgba(143,184,154,0.3); }
  .badge-mid  { background: rgba(200,168,106,0.15); color: var(--amber); border: 0.5px solid rgba(200,168,106,0.3); }
  .badge-low  { background: rgba(255,255,255,0.05); color: var(--text-muted); border: 0.5px solid var(--border); }

  .match-row {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.25rem;
  }
  .match-bar {
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .match-fill {
    height: 100%;
    transition: width 0.8s ease;
  }
  .fill-high { background: var(--green); }
  .fill-mid  { background: var(--amber); }
  .fill-low  { background: var(--text-dim); }

  .card-meta {
    display: flex;
    gap: 2rem;
    flex-wrap: wrap;
    margin-bottom: 1.25rem;
    padding-top: 1.25rem;
    border-top: 0.5px solid var(--border);
  }
  .meta-item {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .meta-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .course-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .course-tag {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 3px 10px;
    border: 0.5px solid var(--border);
    border-radius: 2px;
    color: var(--text-muted);
  }
  .card-link {
    color: var(--accent);
    text-decoration: none;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .empty {
    text-align: center;
    padding: 4rem 1rem;
    color: var(--text-muted);
    font-style: italic;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<nav>
  <div class="logo">Freemover</div>
  <div class="nav-tag">Beta — Live från Google Sheets</div>
</nav>

<section class="hero">
  <p class="hero-label">Utbytesstudier, förenklat</p>
  <h1>Hitta ditt <em>rätta</em><br>utbytesuniversitet</h1>
  <p class="hero-sub">Data hämtas automatiskt från din Google Sheets. Lägg till nya universitet där — hemsidan uppdateras direkt.</p>
</section>

<section class="search-section">
  <div class="search-grid">
    <div class="field">
      <label>Ditt lärosäte</label>
      <select id="sel-home">
        <option>Linköpings universitet</option>
      </select>
    </div>
    <div class="field">
      <label>Din utbildning</label>
      <select id="sel-prog">
        <option>Civilingenjör Datateknik</option>
      </select>
    </div>
  </div>
  <div class="search-grid-3">
    <div class="field">
      <label>Land</label>
      <select id="sel-country">
        <option value="all">Alla länder</option>
        <option value="Nederländerna">Nederländerna</option>
        <option value="Finland">Finland</option>
        <option value="Tyskland">Tyskland</option>
      </select>
    </div>
    <div class="field">
      <label>Termin</label>
      <select id="sel-term">
        <option>Höst 2025</option>
        <option>Vår 2026</option>
      </select>
    </div>
    <div class="field">
      <label>Språk</label>
      <select id="sel-lang">
        <option value="all">Alla</option>
        <option value="Engelska">Engelska</option>
      </select>
    </div>
  </div>
  <button class="search-btn" onclick="runSearch()">Sök kompatibla universitet →</button>
</section>

<div class="divider">
  <div class="divider-line"></div>
  <div class="divider-text" id="divider-label">Laddar universitet...</div>
  <div class="divider-line"></div>
</div>

<section class="results">
  <div id="results-header" class="results-header" style="display:none">
    <h2 id="results-title">Resultat</h2>
    <span id="results-count"></span>
  </div>
  <div class="filters" id="filters" style="display:none">
    <button class="filter-btn active" onclick="setFilter(this,'all')">Alla</button>
    <button class="filter-btn" onclick="setFilter(this,'high')">Hög matchning</button>
    <button class="filter-btn" onclick="setFilter(this,'nl')">Nederländerna</button>
    <button class="filter-btn" onclick="setFilter(this,'de')">Tyskland</button>
    <button class="filter-btn" onclick="setFilter(this,'free')">Utan avgift</button>
  </div>
  <div id="uni-list"></div>
</section>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTAa9qeWsvV_sYuZ5m8-2t-3N08Y2sN1_au0tEZqBYWzFRJP9NGLTxZKSN40y-Sq6HoDbWH-iO80bPT/pub?output=csv";

let universities = [];
let currentFilter = 'all';
let searched = false;

async function loadData() {
  try {
    const response = await fetch(CSV_URL);
    const csvText = await response.text();
    universities = parseCSVToUniversities(csvText);
    
    document.getElementById('divider-label').textContent = `${universities.length} lärosäten i databasen`;
    runSearch(); // Visa resultat direkt
  } catch (err) {
    console.error(err);
    document.getElementById('divider-label').innerHTML = '❌ Kunde inte ladda data. Kontrollera att CSV-länken är publik.';
  }
}

function parseCSVToUniversities(csv) {
  const lines = csv.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.replace(/"/g, '').trim());
  const data = [];

  for (let i = 1; i < lines.length; i++) {
    const values = lines[i].split(',').map(v => v.replace(/"/g, '').trim());
    if (values.length < 6) continue;

    if (values[5] && values[5].toLowerCase() === 'ja') {   // Kolumn F = Accepterar freemovers
      data.push({
        id: values[0],
        name: values[1],
        country: values[2],
        city: values[3],
        url: values[4],
        lang: values[5],
        deadline_ht: values[6] || "Okänd",
        cost: values[8] ? parseInt(values[8]) : null,
        spraakkrav: values[11] || "",
        match: 82, // Temporär – kan kopplas till Programkopplingar senare
        comment: values[14] || "",
        courses: ["AI & ML", "Algoritmer & Datastrukturer"] // Kan utökas
      });
    }
  }
  return data;
}

function badgeClass(m) {
  if (m >= 85) return 'badge-high';
  if (m >= 70) return 'badge-mid';
  return 'badge-low';
}

function renderCard(u, delay) {
  const matchLabel = u.match + '% matchning';
  return `
    <div class="uni-card" style="animation-delay:${delay}s">
      <div class="card-top">
        <div>
          <div class="uni-name">${u.name}</div>
          <div class="uni-city">${u.city}, ${u.country}</div>
        </div>
        <span class="match-badge ${badgeClass(u.match)}">${matchLabel}</span>
      </div>
      <div class="match-row">
        <div class="match-bar"><div class="match-fill ${u.match >= 85 ? 'fill-high' : u.match >= 70 ? 'fill-mid' : 'fill-low'}" style="width:${u.match}%"></div></div>
        <span class="match-pct">${u.match}%</span>
      </div>
      <div class="card-meta">
        <div class="meta-item">
          <span class="meta-label">Avgift</span>
          <span class="meta-val">${u.cost ? '€' + u.cost : 'Okänt'}</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">Språk</span>
          <span class="meta-val">${u.lang}</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">Deadline HT</span>
          <span class="meta-val">${u.deadline_ht}</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">Språkkrav</span>
          <span class="meta-val">${u.spraakkrav}</span>
        </div>
      </div>
      ${u.comment ? `<p style="margin-top:1rem;font-size:0.9rem;color:var(--text-muted);font-style:italic;">${u.comment}</p>` : ''}
      <a class="card-link" href="${u.url}" target="_blank">Besök universitetet →</a>
    </div>`;
}

function runSearch() {
  searched = true;
  let list = [...universities];

  const country = document.getElementById('sel-country').value;
  if (country !== 'all') list = list.filter(u => u.country === country);

  list.sort((a, b) => b.match - a.match);

  document.getElementById('results-header').style.display = 'flex';
  document.getElementById('filters').style.display = 'flex';
  document.getElementById('results-title').textContent = 'Kompatibla universitet';
  document.getElementById('results-count').textContent = list.length + ' lärosäten';

  renderList(list);
}

function renderList(list) {
  const el = document.getElementById('uni-list');
  if (!list.length) {
    el.innerHTML = '<div class="empty">Inga resultat – prova andra filter.</div>';
    return;
  }
  el.innerHTML = list.map((u, i) => renderCard(u, i * 0.07)).join('');
}

function setFilter(btn, type) {
  currentFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  runSearch();
}

// Starta applikationen
loadData();
</script>
</body>
</html>
