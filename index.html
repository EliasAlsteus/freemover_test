<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UniMatchr</title>

<link href="https://fonts.googleapis.com/css2?family=EB+Garamond&family=DM+Mono&display=swap" rel="stylesheet">

<style>
body {
  background:#2a2a2a;
  color:#f0ece4;
  font-family:'EB Garamond', serif;
}

nav {
  padding:20px;
  display:flex;
  justify-content:space-between;
}

.hero {
  text-align:center;
  margin-top:80px;
}

.char {
  display:inline-block;
  transform:translateY(0);
  transition:0.3s;
}

.bounce {
  transform:translateY(-20px);
}

button {
  margin-top:30px;
  padding:10px 20px;
  cursor:pointer;
}

.uni-card {
  border:1px solid #444;
  margin:10px;
  padding:15px;
}
</style>
</head>

<body>

<nav>
  <div>UniMatchr</div>
  <div>Beta</div>
</nav>

<section class="hero">
  <h1>
    Find your <em>perfect</em><br>
    <span class="animated-text">exchange university</span>
  </h1>
</section>

<button onclick="runSearch()">Search</button>

<div id="uni-list"></div>

<script>
// =====================
// TEXT ANIMATION (WORKING)
// =====================
window.addEventListener('load', () => {
  const el = document.querySelector('.animated-text');
  const text = el.textContent;

  el.innerHTML = text.split('').map(c =>
    `<span class="char">${c}</span>`
  ).join('');

  const chars = document.querySelectorAll('.char');

  setInterval(() => {
    chars.forEach((c, i) => {
      setTimeout(() => {
        c.classList.add('bounce');
        setTimeout(() => c.classList.remove('bounce'), 300);
      }, i * 50);
    });
  }, 2000);
});


// =====================
// DATABASE (DIN ORIGINAL - FUNKAR)
// =====================
let universities = [];

const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTAa9qeWsvV_sYuZ5m8-2t-3N08Y2sN1_au0tEZqBYWzFRJP9NGLTxZKSN40y-Sq6HoDbWH-iO80bPT/pub?output=csv";

async function fetchData() {
  const res = await fetch(CSV_URL);
  const text = await res.text();

  const rows = text.split("\n").slice(1);

  universities = rows.map(r => {
    const cols = r.split(",");
    return {
      name: cols[1],
      country: cols[2],
      city: cols[3]
    };
  });
}

function runSearch() {
  const list = document.getElementById("uni-list");

  list.innerHTML = universities.map(u => `
    <div class="uni-card">
      <b>${u.name}</b><br>
      ${u.city}, ${u.country}
    </div>
  `).join("");
}

fetchData();
</script>

</body>
</html>
